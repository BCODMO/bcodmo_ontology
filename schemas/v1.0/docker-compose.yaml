# docker compose run --rm widoco
services:
  widoco:
    image: ghcr.io/dgarijo/widoco:v1.4.25
    platform: linux/amd64
    stdin_open: true    
    tty: true           
    volumes:
      - ./:/usr/local/widoco/in:Z
      - ./docs:/usr/local/widoco/out:Z
    command: -ontFile in/bcodmo.ttl -outFolder out -rewriteAll -oops
